# Optional: full pytest including R/redist (workflow_dispatch only).
# Default CI remains .github/workflows/ci.yml (no R required).

name: CI heavy

on:
  workflow_dispatch:

jobs:
  test-all-markers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Pytest (all markers)
        run: uv run pytest --override-ini addopts=
